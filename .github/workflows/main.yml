name: Build GlucoGuard APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.12
          cache-disabled: false # Promijenite u true ako GitHub i dalje javlja greške sa cache-om

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap sync android
          # Osigurajmo da Capacitor nije ponovo kreirao wrapper fajlove koji mogu uzrokovati greske validacije
          rm -f android/gradlew android/gradlew.bat android/gradle/wrapper/gradle-wrapper.jar

      - name: Build Android APK
        run: |
          cd android
          # Koristimo 'gradle' (system-wide) umjesto './gradlew' (wrapper)
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GlucoGuard-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
